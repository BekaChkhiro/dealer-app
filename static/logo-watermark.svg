<svg width="200" height="60" xmlns="http://www.w3.org/2000/svg">
  <!-- Background with slight transparency -->
  <rect width="200" height="60" fill="rgba(0,0,0,0.1)" rx="5"/>

  <!-- Royal Motors Text -->
  <text x="100" y="25"
        font-family="Arial, sans-serif"
        font-size="18"
        font-weight="bold"
        fill="white"
        text-anchor="middle"
        style="text-shadow: 2px 2px 4px rgba(0,0,0,0.8);">
    ROYAL
  </text>

  <text x="100" y="45"
        font-family="Arial, sans-serif"
        font-size="16"
        font-weight="normal"
        fill="white"
        text-anchor="middle"
        style="text-shadow: 2px 2px 4px rgba(0,0,0,0.8);">
    MOTORS
  </text>

  <!-- Decorative element -->
  <circle cx="15" cy="30" r="8" fill="none" stroke="white" stroke-width="2"/>
  <circle cx="185" cy="30" r="8" fill="none" stroke="white" stroke-width="2"/>
</svg>
